# Environment (development, test, production)
environment: development

# LLM Configuration
llm:
  provider: openai
  model: gpt-3.5-turbo
  temperature: 0.1
  max_tokens: 1000

# Embedding Configuration
embedding:
  model: text-embedding-ada-002
  dimension: 1536

# Database Configuration
vector_db:
  type: simple
  location: local
  collection_name: strathmore_handbook

# Chunking Configuration
chunking:
  chunk_size: 500
  chunk_overlap: 50

# API Configuration
api:
  host: 0.0.0.0
  port: 8000
  debug: true
